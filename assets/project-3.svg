<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080" role="img" aria-label="Inside Airbnb Analytics - dashboards and KPIs">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#141414"/>
      <stop offset="1" stop-color="#232020"/>
    </linearGradient>
    <linearGradient id="ac3" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#8d7c7c"/>
      <stop offset="1" stop-color="#c9bdb8"/>
    </linearGradient>
  </defs>
  <rect width="1080" height="1080" fill="url(#bg3)"/>
  <circle cx="860" cy="860" r="340" fill="#8d7c7c" opacity="0.08"/>
  <text x="90" y="150" font-family="Nunito, Arial, sans-serif" font-size="34" letter-spacing="8" fill="#8d7c7c">DASHBOARDS &amp; KPIs</text>
  <text x="90" y="235" font-family="Nunito, Arial, sans-serif" font-size="70" font-weight="800" fill="#f5f2ec">Inside Airbnb</text>
  <text x="90" y="315" font-family="Nunito, Arial, sans-serif" font-size="70" font-weight="800" fill="#f5f2ec">Analytics</text>

  <!-- KPI cards -->
  <g transform="translate(90,400)">
    <rect x="0" y="0" width="270" height="130" rx="18" fill="#1c1919" stroke="#8d7c7c" stroke-width="2"/>
    <text x="24" y="56" font-family="Nunito, Arial, sans-serif" font-size="46" font-weight="800" fill="#c9bdb8">$148</text>
    <text x="24" y="96" font-family="Nunito, Arial, sans-serif" font-size="24" fill="#8d7c7c">Avg. nightly</text>

    <rect x="300" y="0" width="270" height="130" rx="18" fill="#1c1919" stroke="#8d7c7c" stroke-width="2"/>
    <text x="324" y="56" font-family="Nunito, Arial, sans-serif" font-size="46" font-weight="800" fill="#c9bdb8">72%</text>
    <text x="324" y="96" font-family="Nunito, Arial, sans-serif" font-size="24" fill="#8d7c7c">Occupancy</text>

    <rect x="600" y="0" width="300" height="130" rx="18" fill="#1c1919" stroke="#8d7c7c" stroke-width="2"/>
    <text x="624" y="56" font-family="Nunito, Arial, sans-serif" font-size="46" font-weight="800" fill="#c9bdb8">18.4k</text>
    <text x="624" y="96" font-family="Nunito, Arial, sans-serif" font-size="24" fill="#8d7c7c">Listings</text>
  </g>

  <!-- bar chart -->
  <g transform="translate(90,600)">
    <rect x="0" y="0" width="480" height="360" rx="18" fill="#1c1919" stroke="#8d7c7c" stroke-width="2"/>
    <g fill="url(#ac3)">
      <rect x="50"  y="220" width="52" height="110" rx="8"/>
      <rect x="130" y="160" width="52" height="170" rx="8"/>
      <rect x="210" y="120" width="52" height="210" rx="8"/>
      <rect x="290" y="70"  width="52" height="260" rx="8"/>
      <rect x="370" y="150" width="52" height="180" rx="8"/>
    </g>
  </g>

  <!-- line chart -->
  <g transform="translate(600,600)">
    <rect x="0" y="0" width="390" height="360" rx="18" fill="#1c1919" stroke="#8d7c7c" stroke-width="2"/>
    <polyline points="40,270 110,220 180,240 250,150 320,100 350,120" fill="none" stroke="#c9bdb8" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    <g fill="#c9bdb8">
      <circle cx="40" cy="270" r="8"/><circle cx="110" cy="220" r="8"/>
      <circle cx="180" cy="240" r="8"/><circle cx="250" cy="150" r="8"/>
      <circle cx="320" cy="100" r="8"/>
    </g>
  </g>
  <text x="90" y="1015" font-family="Nunito, Arial, sans-serif" font-size="30" fill="#8d7c7c">Power BI  ·  Python  ·  KPI reporting</text>
</svg>
