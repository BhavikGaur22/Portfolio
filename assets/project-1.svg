<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080" role="img" aria-label="AI Technical Assistant - RAG assistant">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#141414"/>
      <stop offset="1" stop-color="#232020"/>
    </linearGradient>
    <linearGradient id="ac1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#c9bdb8"/>
      <stop offset="1" stop-color="#8d7c7c"/>
    </linearGradient>
  </defs>
  <rect width="1080" height="1080" fill="url(#bg1)"/>
  <circle cx="850" cy="230" r="360" fill="#8d7c7c" opacity="0.08"/>
  <text x="90" y="150" font-family="Nunito, Arial, sans-serif" font-size="34" letter-spacing="8" fill="#8d7c7c">RETRIEVAL-AUGMENTED AI</text>
  <text x="90" y="235" font-family="Nunito, Arial, sans-serif" font-size="70" font-weight="800" fill="#f5f2ec">AI Technical</text>
  <text x="90" y="315" font-family="Nunito, Arial, sans-serif" font-size="70" font-weight="800" fill="#f5f2ec">Assistant</text>

  <!-- document being retrieved -->
  <g transform="translate(120,430)">
    <rect x="0" y="0" width="330" height="420" rx="18" fill="#1c1919" stroke="#8d7c7c" stroke-width="2"/>
    <rect x="40" y="55" width="250" height="18" rx="9" fill="#4a4340"/>
    <rect x="40" y="105" width="210" height="14" rx="7" fill="#3a3533"/>
    <rect x="40" y="145" width="250" height="14" rx="7" fill="#3a3533"/>
    <rect x="40" y="185" width="180" height="14" rx="7" fill="#3a3533"/>
    <rect x="40" y="245" width="250" height="14" rx="7" fill="#3a3533"/>
    <rect x="40" y="285" width="230" height="14" rx="7" fill="#3a3533"/>
    <rect x="40" y="325" width="150" height="14" rx="7" fill="#c9bdb8"/>
  </g>

  <!-- arrow -->
  <path d="M470 640 h120" stroke="url(#ac1)" stroke-width="8" fill="none" stroke-linecap="round"/>
  <path d="M590 640 l-26 -18 v36 z" fill="#c9bdb8"/>

  <!-- chat / answer bubbles -->
  <g transform="translate(620,470)">
    <rect x="0" y="0" width="340" height="90" rx="26" fill="#8d7c7c"/>
    <rect x="34" y="34" width="230" height="12" rx="6" fill="#2a2624"/>
    <rect x="34" y="58" width="170" height="12" rx="6" fill="#2a2624"/>
    <rect x="0" y="120" width="300" height="110" rx="26" fill="#1c1919" stroke="#8d7c7c" stroke-width="2"/>
    <rect x="34" y="152" width="230" height="12" rx="6" fill="#5a524f"/>
    <rect x="34" y="178" width="200" height="12" rx="6" fill="#4a4340"/>
    <rect x="34" y="204" width="150" height="12" rx="6" fill="#c9bdb8"/>
  </g>

  <!-- spark / assistant node -->
  <g transform="translate(790,760)">
    <circle cx="0" cy="0" r="70" fill="none" stroke="#8d7c7c" stroke-width="2" opacity="0.6"/>
    <circle cx="0" cy="0" r="46" fill="url(#ac1)"/>
    <path d="M0 -26 L8 -8 L26 0 L8 8 L0 26 L-8 8 L-26 0 L-8 -8 Z" fill="#232020"/>
  </g>

  <text x="90" y="1000" font-family="Nunito, Arial, sans-serif" font-size="30" fill="#8d7c7c">Azure OpenAI  ·  AI Search  ·  RAG</text>
</svg>
