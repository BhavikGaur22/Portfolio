<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1000" width="900" height="1000" role="img" aria-label="AI and Data Engineer illustration">
  <defs>
    <linearGradient id="abg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1a1717"/>
      <stop offset="1" stop-color="#2a2624"/>
    </linearGradient>
    <linearGradient id="aac" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#c9bdb8"/>
      <stop offset="1" stop-color="#8d7c7c"/>
    </linearGradient>
  </defs>
  <rect width="900" height="1000" rx="28" fill="url(#abg)"/>
  <circle cx="700" cy="200" r="260" fill="#8d7c7c" opacity="0.10"/>

  <!-- code editor window -->
  <g transform="translate(90,120)">
    <rect x="0" y="0" width="720" height="360" rx="18" fill="#141212" stroke="#8d7c7c" stroke-width="2"/>
    <circle cx="34" cy="34" r="9" fill="#8d7c7c"/>
    <circle cx="66" cy="34" r="9" fill="#4a4340"/>
    <circle cx="98" cy="34" r="9" fill="#4a4340"/>
    <g font-family="monospace" font-size="22">
      <text x="34" y="110" fill="#8d7c7c">def <tspan fill="#c9bdb8">build_rag</tspan>(docs):</text>
      <text x="70" y="150" fill="#6b625f">index = embed(docs)</text>
      <text x="70" y="190" fill="#6b625f">return Assistant(index)</text>
      <text x="34" y="250" fill="#8d7c7c">pipeline = <tspan fill="#c9bdb8">Delta</tspan>(</text>
      <text x="70" y="290" fill="#6b625f">source=oracle, sink=azure</text>
      <text x="34" y="330" fill="#8d7c7c">)</text>
    </g>
  </g>

  <!-- neural network -->
  <g transform="translate(120,560)" stroke="#8d7c7c" stroke-width="2" opacity="0.85">
    <line x1="60" y1="60" x2="330" y2="40"/><line x1="60" y1="60" x2="330" y2="160"/><line x1="60" y1="60" x2="330" y2="280"/>
    <line x1="60" y1="200" x2="330" y2="40"/><line x1="60" y1="200" x2="330" y2="160"/><line x1="60" y1="200" x2="330" y2="280"/>
    <line x1="60" y1="340" x2="330" y2="40"/><line x1="60" y1="340" x2="330" y2="160"/><line x1="60" y1="340" x2="330" y2="280"/>
    <line x1="330" y1="40" x2="600" y2="160"/><line x1="330" y1="160" x2="600" y2="160"/><line x1="330" y1="280" x2="600" y2="160"/>
  </g>
  <g transform="translate(120,560)" fill="url(#aac)">
    <circle cx="60" cy="60" r="18"/><circle cx="60" cy="200" r="18"/><circle cx="60" cy="340" r="18"/>
    <circle cx="330" cy="40" r="18"/><circle cx="330" cy="160" r="18"/><circle cx="330" cy="280" r="18"/>
    <circle cx="600" cy="160" r="22"/>
  </g>

  <text x="450" y="960" text-anchor="middle" font-family="Nunito, Arial, sans-serif" font-size="30" fill="#8d7c7c">AI  ·  Data  ·  Cloud</text>
</svg>
